# Local development stack — NOT used in production cloud deploy
# Production: Render (API) + Vercel (frontend) + Neon/Upstash/Qdrant Cloud

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: acf
      POSTGRES_PASSWORD: acf
      POSTGRES_DB: ai_content_factory
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U acf -d ai_content_factory"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis/redis-stack-server:latest
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    ports:
      - "4000:4000"
    volumes:
      - ./litellm_config.yaml:/app/config.yaml
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    env_file:
      - .env.local
    profiles: ["litellm"]
    depends_on:
      redis:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env.local
    environment:
      APP_ENV: development
      RUN_MIGRATIONS_ON_STARTUP: "true"
      MOCK_LLM: "true"
      DATABASE_URL: postgresql+asyncpg://acf:acf@postgres:5432/ai_content_factory
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      LITELLM_PROXY_URL: http://litellm:4000
    profiles: ["full"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
