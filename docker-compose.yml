services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: acf
      POSTGRES_PASSWORD: acf
      POSTGRES_DB: ai_content_factory
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U acf -d ai_content_factory"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis/redis-stack-server:latest
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    ports:
      - "4000:4000"
    volumes:
      - ./litellm_config.yaml:/app/config.yaml
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://acf:acf@postgres:5432/ai_content_factory
      REDIS_URL: redis://redis:6379/0
      LITELLM_PROXY_URL: http://litellm:4000
      QDRANT_URL: http://qdrant:6333
    volumes:
      - ./backend:/app
      - ./agents:/app/agents
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://acf:acf@postgres:5432/ai_content_factory
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend:/app
      - ./agents:/app/agents
    depends_on:
      - api
      - redis
    command: celery -A app.worker.celery_app worker --loglevel=info

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
