name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: acf
          POSTGRES_PASSWORD: acf
          POSTGRES_DB: ai_content_factory
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis/redis-stack-server:latest
        ports: ["6379:6379"]
    env:
      APP_ENV: development
      MOCK_LLM: "true"
      DATABASE_URL: postgresql+asyncpg://acf:acf@localhost:5432/ai_content_factory
      REDIS_URL: redis://localhost:6379/0
      VECTOR_BACKEND: none
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend deps
        run: pip install -r backend/requirements.txt
      - name: Run migrations
        run: alembic upgrade head
        working-directory: backend
      - name: Import smoke test
        run: python -c "import sys; sys.path.insert(0, 'backend'); sys.path.insert(0, '.'); from agents.graph import build_graph; print('graph ok')"
      - name: Health import smoke
        run: python -c "import sys; sys.path.insert(0, 'backend'); from app.main import app; print('app ok')"

  frontend:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
      NEXT_PUBLIC_WS_URL: http://localhost:8000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
        working-directory: frontend
      - run: npm run build
        working-directory: frontend
