name: Deploy Production

on:
  push:
    branches: [main]

concurrency:
  group: production-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  ci-gate:
    uses: ./.github/workflows/ci.yml

  deploy-api:
    name: Deploy API (Render)
    needs: ci-gate
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Trigger Render deploy
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -z "${RENDER_DEPLOY_HOOK}" ]; then
            echo "::warning::RENDER_DEPLOY_HOOK secret not set — configure in GitHub repo secrets"
            echo "See docs/DEPLOYMENT.md for setup instructions"
            exit 0
          fi
          curl -fsS -X POST "${RENDER_DEPLOY_HOOK}"
          echo "Render deploy triggered"

  deploy-frontend:
    name: Deploy Frontend (Vercel)
    needs: ci-gate
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Deploy to Vercel
        working-directory: frontend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [ -z "${VERCEL_TOKEN}" ] || [ -z "${VERCEL_ORG_ID}" ] || [ -z "${VERCEL_PROJECT_ID}" ]; then
            echo "::warning::VERCEL_TOKEN / VERCEL_ORG_ID / VERCEL_PROJECT_ID not fully configured"
            echo "Manual fallback: cd frontend && npx vercel link --project ai-content-factory && npx vercel --prod"
            echo "See docs/DEPLOYMENT.md for setup instructions"
            exit 0
          fi
          npm ci
          npx vercel@latest deploy --prod --token "${VERCEL_TOKEN}" --yes
