name: Deploy Production

on:
  push:
    branches: [main]

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  ci-gate:
    uses: ./.github/workflows/ci.yml

  deploy-api:
    name: Deploy API (Render)
    needs: ci-gate
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Trigger Render deploy
        if: ${{ secrets.RENDER_DEPLOY_HOOK != '' }}
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          curl -fsS -X POST "$RENDER_DEPLOY_HOOK"
          echo "Render deploy triggered"

      - name: Skip Render (no hook configured)
        if: ${{ secrets.RENDER_DEPLOY_HOOK == '' }}
        run: |
          echo "::warning::RENDER_DEPLOY_HOOK secret not set — configure in GitHub repo secrets"
          echo "See docs/DEPLOYMENT.md for setup instructions"

  deploy-frontend:
    name: Deploy Frontend (Vercel)
    needs: ci-gate
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel
        if: ${{ secrets.VERCEL_TOKEN != '' }}
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: frontend
          vercel-args: "--prod"

      - name: Skip Vercel (no token configured)
        if: ${{ secrets.VERCEL_TOKEN == '' }}
        run: |
          echo "::warning::VERCEL_TOKEN secret not set — configure in GitHub repo secrets"
          echo "See docs/DEPLOYMENT.md for setup instructions"
